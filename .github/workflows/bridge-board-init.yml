name: bridge board init

# One-time: create the Projects v2 board (project-scoped token) and print its
# number, which then goes into the BRIDGE_PROJECT_NUMBER repo variable.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: c4g-john/refuge-for-humans-pmo
          path: pmo
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: c4g-john/docassert-action/install@v1
        with:
          version-file: pmo/.docassert-version
      - name: Create the board
        env:
          PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          docassert bridge create-board --repo "$GITHUB_REPOSITORY" \
            --documents-dir pmo/documents --title "Refuge for Humans"
