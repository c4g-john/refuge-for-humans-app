name: bridge scaffold

# Documents -> issues, using only GITHUB_TOKEN: the governing documents are
# public, and the issues live here. Runs daily and on dispatch; the pmo repo's
# scaffold workflow (PROJECTS_TOKEN) adds merge-triggered immediacy + board ops.
on:
  schedule:
    - cron: "7 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scaffold:
    if: vars.BRIDGE_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: c4g-john/refuge-for-humans-pmo
          path: pmo
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - uses: c4g-john/docassert-action/install@v1
        with:
          version-file: pmo/.docassert-version
      - name: Scaffold Features and Stories from approved documents
        env:
          GH_TOKEN: ${{ github.token }}
          PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          PROJECT_NUMBER: ${{ vars.BRIDGE_PROJECT_NUMBER }}
        run: |
          extra=""
          if [ -n "$PROJECT_NUMBER" ] && [ -n "$PROJECTS_TOKEN" ]; then
            extra="--project-number $PROJECT_NUMBER --init-board"
          fi
          # shellcheck disable=SC2086
          docassert bridge scaffold \
            --repo "$GITHUB_REPOSITORY" \
            --documents-dir pmo/documents \
            --docs-url https://github.com/c4g-john/refuge-for-humans-pmo/blob/main \
            $extra
